<!DOCTYPE html>
<html lang="en" data-theme="nord">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Synker{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/main.css?v=4">
    {% block styles %}{% endblock %}
</head>
<body>
    <div class="app-shell">
        <nav class="app-nav">
            <div class="nav-brand">
                <svg class="nav-logo" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
                <span class="nav-title">Synker</span>
            </div>
            <div class="nav-links">
                {% block nav_items %}
                <a href="/" class="nav-link {% block nav_editor_active %}{% endblock %}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.376 3.622a1 1 0 0 1 3.002 3.002L7.368 18.635a2 2 0 0 1-.855.506l-2.872.838a.5.5 0 0 1-.62-.62l.838-2.872a2 2 0 0 1 .506-.855z"/></svg>
                    <span>Editor</span>
                </a>
                <a href="/files" class="nav-link {% block nav_files_active %}{% endblock %}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
                    <span>Files</span>
                </a>
                <a href="/sync" class="nav-link {% block nav_sync_active %}{% endblock %}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
                    <span>Sync</span>
                </a>
                {% endblock %}
            </div>
            <div class="nav-actions">
                <div class="theme-switcher" id="theme-switcher">
                    <button class="theme-btn" id="theme-toggle" title="Switch theme" aria-label="Switch theme" aria-haspopup="true" aria-expanded="false">
                        <span class="theme-btn-icon" id="theme-btn-icon">❄</span>
                        <span id="theme-btn-label">Nord</span>
                    </button>
                    <div class="theme-menu" id="theme-menu" role="menu">
                        <button class="theme-option" data-theme-value="nord" role="menuitem">
                            <span class="theme-option-icon">❄</span>
                            <span class="theme-option-label">Nord</span>
                            <span class="theme-option-check">✓</span>
                        </button>
                        <button class="theme-option" data-theme-value="matrix" role="menuitem">
                            <span class="theme-option-icon">⌨</span>
                            <span class="theme-option-label">Matrix</span>
                            <span class="theme-option-check">✓</span>
                        </button>
                        <button class="theme-option" data-theme-value="nerd" role="menuitem">
                            <span class="theme-option-icon">🤓</span>
                            <span class="theme-option-label">Nerd</span>
                            <span class="theme-option-check">✓</span>
                        </button>
                        <button class="theme-option" data-theme-value="contrast" role="menuitem">
                            <span class="theme-option-icon">◑</span>
                            <span class="theme-option-label">High Contrast</span>
                            <span class="theme-option-check">✓</span>
                        </button>
                        <button class="theme-option" data-theme-value="pinky" role="menuitem">
                            <span class="theme-option-icon">🌸</span>
                            <span class="theme-option-label">Pinky</span>
                            <span class="theme-option-check">✓</span>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="app-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
